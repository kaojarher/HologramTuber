<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息陪伴</title>

    <!-- PWA 支援 -->
    <meta name="application-name" content="AI 全息陪伴">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="全息陪伴">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#030712">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22AI%20%E5%85%A8%E6%81%AF%E9%99%AA%E4%BC%B4%22%2C%22short_name%22%3A%22%E5%85%A8%E6%81%AF%E9%99%AA%E4%BC%B4%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23030712%22%2C%22theme_color%22%3A%22%23030712%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%25270%25200%2520100%2520100%2527%253E%253Ctext%2520y%3D%2527.9em%2527%2520font-size%3D%252790%2527%253E%25F0%259F%25A7%259D%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

    <!-- iOS 主畫面圖示（emoji SVG inline） -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23030712'/><text y='.85em' font-size='72' x='50%25' text-anchor='middle'>🧝</text></svg>">

    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #111827;
            --card-bg: #1f2937;
            --text-color: #f9fafb;
            --accent-cyan: #06b6d4;
            --accent-purple: #9333ea;
            --holo-glow: rgba(6, 182, 212, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif; }
        
        html, body { 
            height: 100%; 
            height: 100dvh; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden;
            position: relative;
        }

        .container { display: flex; width: 100%; height: 100%; }

        /* ======================= 控制設定面板 ======================= */
        .control-panel {
            width: 300px; background-color: var(--panel-bg); border-right: 1px solid #374151;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; transition: transform 0.3s ease; z-index: 100;
        }

        h2, h3 { color: var(--accent-cyan); border-bottom: 1px solid #374151; padding-bottom: 5px; font-size: 1rem; margin-top: 10px; }

        .backup-card {
            background: linear-gradient(145deg, #1f2937, #111827);
            border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem;
        }

        .btn { background: var(--card-bg); border: 1px solid #4b5563; color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; width: 100%; text-align: center; margin-top: 5px;}
        .btn:hover { background: #374151; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); border: none; font-weight: bold; color: #fff; }

        /* ======================= 主顯示區 (上下嚴格分層) ======================= */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; /* 垂直排列：上方立繪，下方對話 */
            background: radial-gradient(circle at center, #111827 0%, #030712 100%); 
            position: relative; 
            height: 100%; 
            overflow: hidden;
        }

        /* 上方：大型立繪展示區 */
        .cabin-section { 
            flex: 1; /* 自動撐滿上方剩餘空間 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            position: relative; 
            min-height: 0; /* 防止子元素溢出擠壓佈局 */
        }
        
        .hologram-cabin {
            width: 100%; 
            max-width: 450px; 
            height: 100%; 
            background: rgba(31, 41, 55, 0.3);
            border: 2px solid #374151; border-radius: 24px; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 40px var(--holo-glow);
        }

        /* 貓耳娘形象呼吸與浮動律動 */
        .fullbody-display {
            width: 100%; height: 90%; 
            display: flex; align-items: flex-end; justify-content: center;
            position: relative; z-index: 2;
            animation: floatRhythm 4.5s ease-in-out infinite; 
        }
        
        .fullbody-display img {
            max-width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
        }

        /* 全息網格特效線 */
        .fullbody-display::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(6, 182, 212, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 3;
        }

        @keyframes floatRhythm {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-10px); filter: brightness(1.15); }
        }

        /* 艙體內部的短動態字幕提示 */
        #subtitle {
            position: absolute; bottom: 15px; background: rgba(3, 7, 18, 0.75); 
            padding: 4px 14px; border-radius: 12px; font-size: 0.75rem; 
            color: var(--accent-cyan); border: 1px solid rgba(6, 182, 212, 0.4); 
            max-width: 85%; text-align: center; z-index: 5; pointer-events: none;
        }

        /* ======================= 下方：獨立對話工作區 (文字嚴格歸位) ======================= */
        .chat-section { 
            flex: 0 0 35%; /* 鎖定佔用螢幕總高度的 35% */
            min-height: 220px; 
            display: flex; flex-direction: column; 
            background: rgba(17, 24, 39, 0.98); 
            border-top: 2px solid var(--accent-cyan); 
            overflow: hidden; 
            z-index: 10; 
        }

        /* 對話歷史紀錄容器 */
        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
        }

        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; line-height: 1.5; word-break: break-all; }
        .msg.user { background: var(--accent-purple); align-self: flex-end; color: #fff; box-shadow: 0 2px 8px rgba(147, 51, 234, 0.3); }
        .msg.ai { 
            background: #253047; align-self: flex-start; 
            border-left: 4px solid var(--accent-cyan);
            color: var(--text-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .typing { white-space: pre-wrap; }

        /* 底部輸入與語音控制區 */
        .input-area { 
            padding: 10px 15px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: #111827; 
            display: flex; 
            gap: 8px; 
            align-items: center;
            border-top: 1px solid #374151;
        }

        input[type="text"] { 
            flex: 1; background: #1f2937; border: 1px solid #4b5563; 
            color: #fff; padding: 12px 16px; border-radius: 25px; 
            outline: none; font-size: 16px;
        }
        
        .icon-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: 0.2s; background: #374151; color: white;
        }
        .icon-btn.active { background: var(--accent-cyan); color: #030712; animation: pulse 1.5s infinite; }
        .btn-send { background: var(--accent-cyan); color: #030712; width: 60px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; height: 42px;}

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }

        .mobile-toggle { position: absolute; top: 10px; left: 10px; z-index: 200; background: #1f2937; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }

        @media (max-width: 768px) {
            .control-panel { position: absolute; transform: translateX(-100%); height: 100%; width: 280px; }
            .control-panel.open { transform: translateX(0); }
            .hologram-cabin { max-width: 100%; } 
            .chat-section { flex: 0 0 38%; } 
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleMenu()" id="menuBtn">⚙️ 控制台</button>

    <div class="container">
        <div class="control-panel" id="panel">
            <h2 style="margin-top:40px">全息備存中心</h2>
            
            <div class="backup-card">
                <p style="font-weight: bold; color: var(--accent-cyan)">☁️ Google Drive 備份</p>
                <button class="btn btn-primary" onclick="handleAuth()">1. 帳號授權</button>
                <button class="btn" onclick="saveToDrive()">2. 匯出配置到雲端</button>
                <button class="btn" onclick="loadFromDrive()">3. 從雲端匯入還原</button>
                <div id="authStatus" style="font-size:0.7rem; text-align:center; color:#9ca3af">狀態：未連線</div>
            </div>

            <div class="section">
                <h3>形象設定</h3>
                <label class="btn" style="display:block; text-align:center; cursor:pointer; background:#374151; padding:10px; border-radius:8px">
                    📸 上傳全身立繪
                    <input type="file" style="display:none" accept="image/*" onchange="handleImg(this)">
                </label>
            </div>

            <div class="section">
                <h3>互動模式</h3>
                <div style="font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <span>動態打字效果</span>
                    <input type="checkbox" id="useTypingEffect" checked>
                </div>
                <div style="font-size:0.85rem; display:flex; justify-content:space-between; align-items:center">
                    <span>臺灣語音朗讀</span>
                    <input type="checkbox" id="autoSpeech" checked>
                </div>
            </div>

            <div class="section">
                <h3>模型與性格</h3>
                <select id="modelSelect" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; border:1px solid #4b5563;">
                    <option value="gpt-4o">GPT-4o (推薦)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5</option>
                </select>
                <select id="personality" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; margin-top:5px; border:1px solid #4b5563;">
                    <option value="溫柔體貼、愛關心人的臺灣女生">溫柔體貼 (TW)</option>
                    <option value="幽默風趣、講話帶點乾醋的臺灣死黨">幽默風趣 (TW)</option>
                </select>
            </div>

            <div class="backup-card" id="installCard" style="display:none; border-color:#9333ea;">
                <p style="font-weight:bold; color:#a78bfa; font-size:0.85rem;">🧝 安裝為 App</p>
                <p style="color:#9ca3af; font-size:0.72rem; line-height:1.5;">將全息陪伴加到主畫面，像原生 App 一樣使用！</p>
                <button class="btn btn-primary" id="installBtn" onclick="installApp()" style="background:linear-gradient(135deg,#7c3aed,#9333ea); border:none; color:#fff; margin-top:4px;">
                    🧝 安裝到主畫面
                </button>
                <div style="color:#6b7280; font-size:0.7rem; text-align:center; margin-top:4px;" id="installNote"></div>
            </div>

            <div class="backup-card" style="border-color:#374151;">
                <p style="font-weight:bold; color:#9ca3af; font-size:0.8rem;">📱 iOS 手動安裝</p>
                <p style="color:#6b7280; font-size:0.7rem; line-height:1.6;">
                    Safari 瀏覽器開啟本頁<br>
                    → 點底部 <strong style="color:#9ca3af">「分享」</strong> 按鈕<br>
                    → 選擇 <strong style="color:#9ca3af">「加入主畫面」</strong><br>
                    → 圖示會顯示 🧝 人物
                </p>
            </div>
        </div>

        <div class="main-display" onclick="closeMenu()">
            
            <div class="cabin-section">
                <div class="hologram-cabin">
                    <div class="fullbody-display">
                        <img src="https://via.placeholder.com/350x750/111827/06b6d4?text=AI+Hologram" id="displayImg">
                    </div>
                </div>
                <div id="subtitle">全息系統連線中...</div>
            </div>

            <div class="chat-section">
                <div class="chat-box" id="chatBox">
                    <div class="msg ai typing">全息傳輸核心初始化中...</div>
                </div>
                
                <div class="input-area">
                    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="語音輸入">🎤</button>
                    <input type="text" id="userInput" placeholder="請輸入訊息或語音..." onkeypress="if(event.key==='Enter')send()">
                    <button class="btn-send" onclick="send()">發送</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ======================= Google API 設定 =======================
        const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;
        let accessToken = null;
        // ======================= Puter AI 無需等待 ready，直接可用 =======================
        window.addEventListener('DOMContentLoaded', () => {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            const initMsg = appendMsg('ai', '', false);
            typeText(initMsg, "您好！全息同步核心啟動完成。Puter AI 已就緒，試著跟我聊聊吧！", 20);
            document.getElementById('subtitle').innerText = "全息投影就緒，請對話。";
        });

        // ======================= 臺灣語音輸入 (STT) =======================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = false;
            recognition.continuous = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                send(); 
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('active');
                fixViewportScroll(); 
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("您的設備不支援語音辨識");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                document.getElementById('voiceBtn').classList.add('active');
            }
        }

        // ======================= 臺灣語音輸出 (TTS) =======================
        function speakText(text) {
            if (!document.getElementById('autoSpeech').checked) return;
            window.speechSynthesis.cancel(); 
            
            const cleanText = text.replace(/[\*#`_\-]/g, '');
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.lang = 'zh-TW';
            msg.rate = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.name.includes('Hanhan') || v.name.includes('Yating'));
            if (twVoice) msg.voice = twVoice;
            
            window.speechSynthesis.speak(msg);
        }

        // ======================= 打字效果邏輯 =======================
        function typeText(element, text, delay = 30) {
            element.textContent = '';
            let index = 0;

            function typeNextChar() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    scrollToBottom(); 
                    setTimeout(typeNextChar, delay);
                } else {
                    element.classList.remove('typing');
                }
            }
            element.classList.add('typing');
            typeNextChar();
        }

        // ======================= 行動端防震盪滾動修正 =======================
        function fixViewportScroll() {
            window.scrollTo(0, 0);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 120);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 280);
        }

        // ======================= Google Drive 備份還原流程 =======================
        window.onload = () => {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (res) => {
                        accessToken = res.access_token;
                        document.getElementById('authStatus').innerText = "✅ 雲端連線成功";
                        document.getElementById('authStatus').style.color = "#06b6d4";
                    },
                });
            } catch(e) { console.log("Google SDK 等待中"); }
            window.speechSynthesis.getVoices(); 
        };

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }

        async function saveToDrive() {
            if (!accessToken) return alert("請先完成帳號授權連線");
            const data = {
                image: document.getElementById('displayImg').src,
                model: document.getElementById('modelSelect').value,
                personality: document.getElementById('personality').value,
                chatHistory: chatHistory,
                savedAt: new Date().toISOString()
            };
            const metadata = { name: 'ai_hologram_layout_save.json', mimeType: 'application/json' };
            const file = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', file);

            try {
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                    body: form
                });
                alert(`✅ 配置與對話記憶（${chatHistory.length} 則）已備份至 Google Drive！`);
            } catch (e) { alert("❌ 備份失敗"); }
        }

        async function loadFromDrive() {
            if (!accessToken) return alert("請先完成帳號授權連線");
            try {
                const search = await fetch('https://www.googleapis.com/drive/v3/files?q=name="ai_hologram_layout_save.json"&orderBy=createdTime desc', {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const list = await search.json();
                if (list.files.length === 0) return alert("找不到雲端備份檔案。");
                
                const fileId = list.files[0].id;
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const config = await fileRes.json();
                
                document.getElementById('displayImg').src = config.image;
                document.getElementById('modelSelect').value = config.model;
                document.getElementById('personality').value = config.personality;

                // 還原對話記憶
                if (config.chatHistory && Array.isArray(config.chatHistory)) {
                    chatHistory.length = 0;
                    config.chatHistory.forEach(msg => chatHistory.push(msg));

                    // 在對話框重新渲染歷史訊息
                    const box = document.getElementById('chatBox');
                    box.innerHTML = '';
                    const savedTime = config.savedAt ? new Date(config.savedAt).toLocaleString('zh-TW') : '未知';
                    const sysMsg = appendMsg('ai', '', false);
                    sysMsg.style.opacity = '0.6';
                    sysMsg.style.fontSize = '0.78rem';
                    sysMsg.textContent = `📂 已還原 ${config.chatHistory.length} 則對話記憶（備份時間：${savedTime}）`;

                    config.chatHistory.forEach(msg => {
                        if (msg.role === 'user' || msg.role === 'assistant') {
                            appendMsg(msg.role === 'user' ? 'user' : 'ai', msg.content);
                        }
                    });
                }

                alert(`✅ 成功從雲端還原！已載入 ${chatHistory.length} 則對話記憶。`);
                closeMenu();
            } catch (e) { alert("❌ 還原失敗：" + e.message); }
        }

        // ======================= 核心對話與對答邏輯 =======================
        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('displayImg').src = e.target.result;
                    document.getElementById('subtitle').innerText = "新形象已載入";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 對話歷史記憶（多輪上下文）
        const chatHistory = [];

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMsg('user', text);
            input.value = '';
            input.blur(); 
            fixViewportScroll();

            document.getElementById('subtitle').innerText = "系統運算中...";

            // 將使用者訊息加入歷史
            chatHistory.push({ role: 'user', content: text });

            try {
                const personality = document.getElementById('personality').value;
                const systemMsg = `你現在是全息投影虛擬陪伴人物，性格特質是：${personality}。請完全使用繁體中文、臺灣口音與語氣回答，語氣自然生動。`;

                // puter.ai.chat 支援傳入 messages 陣列以保留上下文
                const messages = [
                    { role: 'system', content: systemMsg },
                    ...chatHistory
                ];
                const resp = await puter.ai.chat(messages);

                // puter v2 回傳結構：resp.message.content[0].text
                let replyText = '';
                if (resp && resp.message && resp.message.content && resp.message.content[0]) {
                    replyText = resp.message.content[0].text || '';
                } else if (typeof resp === 'string') {
                    replyText = resp;
                } else {
                    replyText = JSON.stringify(resp);
                }
                replyText = replyText.trim();

                // 將 AI 回覆也存入歷史
                chatHistory.push({ role: 'assistant', content: replyText });

                const aiMsgEl = appendMsg('ai', '', false); 
                document.getElementById('subtitle').innerText = "投影傳輸中...";

                if (document.getElementById('useTypingEffect').checked) {
                    typeText(aiMsgEl, replyText, 30);
                } else {
                    aiMsgEl.textContent = replyText;
                    scrollToBottom();
                }

                speakText(replyText); 
            } catch (e) {
                console.error("Puter AI 錯誤:", e);
                // 發生錯誤時把最後一筆使用者訊息移出，避免歷史汙染
                chatHistory.pop();
                const errEl = appendMsg('ai', '', false);
                errEl.textContent = `連線異常：${e.message || e}`;
                document.getElementById('subtitle').innerText = "傳輸失敗";
            }
        }

        function appendMsg(role, text, setText = true) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            if (setText) d.innerText = text;
            box.appendChild(d);
            scrollToBottom();
            return d;
        }

        function scrollToBottom() {
            const box = document.getElementById('chatBox');
            box.scrollTop = box.scrollHeight;
        }

        function toggleMenu() { document.getElementById('panel').classList.toggle('open'); }
        function closeMenu() { document.getElementById('panel').classList.remove('open'); }

        // 行動端可視範圍優化
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                scrollToBottom();
            });
            window.visualViewport.addEventListener('scroll', () => {
                if(window.visualViewport.offsetTop > 0){
                    window.scrollTo(0,0);
                }
            });
        }

        // ======================= PWA 安裝邏輯 =======================
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const card = document.getElementById('installCard');
            const note = document.getElementById('installNote');
            card.style.display = 'flex';
            note.textContent = '✅ 偵測到 Android 安裝支援';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                const note = document.getElementById('installNote');
                if (outcome === 'accepted') {
                    note.textContent = '🎉 安裝成功！請至主畫面找 🧝';
                    document.getElementById('installCard').style.display = 'none';
                } else {
                    note.textContent = '（已取消安裝）';
                }
                deferredPrompt = null;
            } else {
                alert('請用 Android Chrome 瀏覽器開啟本頁，才能安裝到主畫面。\niOS 請參考下方 Safari 手動安裝步驟。');
            }
        }

        window.addEventListener('appinstalled', () => {
            document.getElementById('installCard').style.display = 'none';
            console.log('PWA 安裝完成');
        });

        // 註冊 Service Worker（讓 PWA manifest 生效）
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => clients.claim());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('離線中'))));
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW:', err));
        }
    </script>
</body>
</html>
