<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息陪伴 - 臺灣語音終極修正版</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #111827;
            --card-bg: #1f2937;
            --text-color: #f9fafb;
            --accent-cyan: #06b6d4;
            --accent-purple: #9333ea;
            --holo-glow: rgba(6, 182, 212, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif; }
        
        html, body { 
            height: 100%; 
            height: 100dvh; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden;
            position: relative;
        }

        .container { display: flex; width: 100%; height: 100%; }

        /* ======================= 控制設定面板 ======================= */
        .control-panel {
            width: 300px; background-color: var(--panel-bg); border-right: 1px solid #374151;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; transition: transform 0.3s ease; z-index: 100;
        }

        h2, h3 { color: var(--accent-cyan); border-bottom: 1px solid #374151; padding-bottom: 5px; font-size: 1rem; }

        .backup-card {
            background: linear-gradient(145deg, #1f2937, #111827);
            border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem;
        }

        .btn { background: var(--card-bg); border: 1px solid #4b5563; color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; width: 100%; text-align: center; margin-top: 5px;}
        .btn:hover { background: #374151; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); border: none; font-weight: bold; color: #fff; }

        /* ======================= 主顯示區 (垂直佈局，絕不溢出) ======================= */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; /* 上下分層 */
            background: radial-gradient(circle at center, #111827 0%, #030712 100%); 
            position: relative; 
            height: 100%; 
            overflow: hidden;
        }

        /* 上方：大型立繪展示區 */
        .cabin-section { 
            flex: 1; /* 自動分配剩餘空間，讓立繪儘可能大 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            position: relative; 
            min-height: 0; /* 關鍵防溢出 */
        }
        
        .hologram-cabin {
            width: 100%; 
            max-width: 450px; 
            height: 100%; 
            background: rgba(31, 41, 55, 0.3);
            border: 2px solid #374151; border-radius: 24px; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 40px var(--holo-glow);
        }

        .fullbody-display {
            width: 100%; height: 90%; 
            display: flex; align-items: flex-end; justify-content: center;
            position: relative; z-index: 2;
            animation: floatRhythm 4.5s ease-in-out infinite; 
        }
        
        .fullbody-display img {
            max-width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
        }

        @keyframes floatRhythm {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-10px); filter: brightness(1.15); }
        }

        #subtitle {
            position: absolute; bottom: 15px; background: rgba(3, 7, 18, 0.75); 
            padding: 4px 14px; border-radius: 12px; font-size: 0.75rem; 
            color: var(--accent-cyan); border: 1px solid rgba(6, 182, 212, 0.4); 
            max-width: 85%; text-align: center; z-index: 5; pointer-events: none;
        }

        /* ======================= 下方：獨立對話工作區 ======================= */
        .chat-section { 
            flex: 0 0 35%; /* 固定佔用螢幕總高度的 35% */
            min-height: 220px; 
            display: flex; flex-direction: column; 
            background: rgba(17, 24, 39, 0.98); 
            border-top: 2px solid var(--accent-cyan); 
            overflow: hidden; 
            z-index: 10; 
        }

        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
        }

        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; line-height: 1.5; word-break: break-all; }
        .msg.user { background: var(--accent-purple); align-self: flex-end; color: #fff; }
        .msg.ai { 
            background: #253047; align-self: flex-start; 
            border-left: 4px solid var(--accent-cyan);
            color: var(--text-color);
        }

        .typing { white-space: pre-wrap; }

        /* 底部輸入與語音控制區 */
        .input-area { 
            padding: 10px 15px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: #111827; 
            display: flex; 
            gap: 8px; 
            align-items: center;
            border-top: 1px solid #374151;
        }

        input[type="text"] { 
            flex: 1; background: #1f2937; border: 1px solid #4b5563; 
            color: #fff; padding: 12px 16px; border-radius: 25px; 
            outline: none; font-size: 16px;
        }
        
        .icon-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: 0.2s; background: #374151; color: white;
        }
        .icon-btn.active { background: var(--accent-cyan); color: #030712; animation: pulse 1.5s infinite; }
        .btn-send { background: var(--accent-cyan); color: #030712; width: 60px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; height: 42px;}

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }

        .mobile-toggle { position: absolute; top: 10px; left: 10px; z-index: 200; background: #1f2937; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }

        @media (max-width: 768px) {
            .control-panel { position: absolute; transform: translateX(-100%); height: 100%; width: 280px; }
            .control-panel.open { transform: translateX(0); }
            .hologram-cabin { max-width: 100%; } 
            .chat-section { flex: 0 0 38%; } 
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleMenu()" id="menuBtn">⚙️ 控制台</button>

    <div class="container">
        <div class="control-panel" id="panel">
            <h2 style="margin-top:40px">全息備存中心</h2>
            
            <div class="backup-card">
                <p style="font-weight: bold; color: var(--accent-cyan)">☁️ Google Drive 備份</p>
                <button class="btn btn-primary" onclick="handleAuth()">1. 帳號授權</button>
                <button class="btn" onclick="saveToDrive()">2. 匯出配置到雲端</button>
                <button class="btn" onclick="loadFromDrive()">3. 從雲端匯入還原</button>
                <div id="authStatus" style="font-size:0.7rem; text-align:center; color:#9ca3af">狀態：未連線</div>
            </div>

            <div class="section">
                <h3>形象設定</h3>
                <label class="btn" style="display:block; text-align:center; cursor:pointer; background:#374151; padding:10px; border-radius:8px">
                    📸 上傳全身立繪
                    <input type="file" style="display:none" accept="image/*" onchange="handleImg(this)">
                </label>
            </div>

            <div class="section">
                <h3>互動模式</h3>
                <div style="font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <span>動態打字效果</span>
                    <input type="checkbox" id="useTypingEffect" checked>
                </div>
                <div style="font-size:0.85rem; display:flex; justify-content:space-between; align-items:center">
                    <span>臺灣語音朗讀</span>
                    <input type="checkbox" id="autoSpeech" checked>
                </div>
            </div>

            <div class="section">
                <h3>模型與性格</h3>
                <select id="modelSelect" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; border:1px solid #4b5563;">
                    <option value="gpt-4o">GPT-4o (推薦)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5</option>
                </select>
                <select id="personality" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; margin-top:5px; border:1px solid #4b5563;">
                    <option value="溫柔體貼、愛關心人的臺灣女生">溫柔體貼 (TW)</option>
                    <option value="幽默風趣、講話帶點乾醋的臺灣死黨">幽默風趣 (TW)</option>
                </select>
            </div>
        </div>

        <div class="main-display" onclick="closeMenu()">
            
            <div class="cabin-section">
                <div class="hologram-cabin">
                    <div class="fullbody-display">
                        <img src="https://via.placeholder.com/350x750/111827/06b6d4?text=AI+Hologram" id="displayImg">
                    </div>
                </div>
                <div id="subtitle">全息投影就緒，請對話。</div>
            </div>

            <div class="chat-section">
                <div class="chat-box" id="chatBox">
                    <div class="msg ai typing">您好！所有的功能已全數修復。我的回覆會老老實實顯示在這個下方框中，不會再遮擋上方的精美立繪。請試試用語音或文字跟我聊聊吧！</div>
                </div>
                
                <div class="input-area">
                    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="語音輸入">🎤</button>
                    <input type="text" id="userInput" placeholder="請輸入訊息或語音..." onkeypress="if(event.key==='Enter')send()">
                    <button class="btn-send" onclick="send()">發送</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ======================= Google API 設定 =======================
        const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;
        let accessToken = null;

        // ======================= 臺灣語音輸入 (STT) =======================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = false;
            recognition.continuous = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                send(); 
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('active');
                fixViewportScroll(); 
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("您的設備不支援語音辨識");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                document.getElementById('voiceBtn').classList.add('active');
            }
        }

        // ======================= 臺灣語音輸出 (TTS) =======================
        function speakText(text) {
            if (!document.getElementById('autoSpeech').checked) return;
            window.speechSynthesis.cancel(); 
            
            const cleanText = text.replace(/[\*#`_\-]/g, '');
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.lang = 'zh-TW';
            msg.rate = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.name.includes('Hanhan') || v.name.includes('Yating'));
            if (twVoice) msg.voice = twVoice;
            
            window.speechSynthesis.speak(msg);
        }

        // ======================= 打字效果邏輯 =======================
        function typeText(element, text, delay = 30) {
            element.textContent = '';
            let index = 0;

            function typeNextChar() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    scrollToBottom(); 
                    setTimeout(typeNextChar, delay);
                } else {
                    element.classList.remove('typing');
                }
            }
            element.classList.add('typing');
            typeNextChar();
        }

        // ======================= 行動端防震盪滾動修正 =======================
        function fixViewportScroll() {
            window.scrollTo(0, 0);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 120);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 280);
        }

        // ======================= Google Drive 備份還原流程 =======================
        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    accessToken = res.access_token;
                    document.getElementById('authStatus').innerText = "✅ 雲端連線成功";
                    document.getElementById('authStatus').style.color = "#06b6d4";
                },
            });
            window.speechSynthesis.getVoices(); 

            const initAiBox = document.querySelector('.msg.ai.typing');
            if (initAiBox) {
                typeText(initAiBox, initAiBox.textContent, 20);
            }
        };

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }

        async function saveToDrive() {
            if (!accessToken) return alert("請先完成帳號授權連線");
            const data = {
                image: document.getElementById('displayImg').src,
                model: document.getElementById('modelSelect').value,
                personality: document.getElementById('personality').value
            };
            const metadata = { name: 'ai_hologram_layout_save.json', mimeType: 'application/json' };
            const file = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', file);

            try {
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                    body: form
                });
                alert("✅ 配置已成功備份至 Google Drive！");
            } catch (e) { alert("❌ 備份失敗"); }
        }

        async function loadFromDrive() {
            if (!accessToken) return alert("請先完成帳號授權連線");
            try {
                const search = await fetch('https://www.googleapis.com/drive/v3/files?q=name="ai_hologram_layout_save.json"&orderBy=createdTime desc', {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const list = await search.json();
                if (list.files.length === 0) return alert("找不到雲端備份檔案。");
                
                const fileId = list.files[0].id;
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const config = await fileRes.json();
                
                document.getElementById('displayImg').src = config.image;
                document.getElementById('modelSelect').value = config.model;
                document.getElementById('personality').value = config.personality;
                alert("✅ 成功從雲端回復設定！");
                closeMenu();
            } catch (e) { alert("❌ 還原失敗"); }
        }

        // ======================= 核心對話與對答邏輯 =======================
        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('displayImg').src = e.target.result;
                    document.getElementById('subtitle').innerText = "新形象已載入";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // 1. 使用者訊息進入下方對話區
            appendMsg('user', text);
            input.value = '';
            input.blur(); 
            fixViewportScroll();

            document.getElementById('subtitle').innerText = "系統運算中...";

            try {
                const model = document.getElementById('modelSelect').value;
                const personality = document.getElementById('personality').value;
                
                // 呼叫 Puter AI 進行對話
                const res = await puter.ai.chat(`你現在是全息投影人物，性格特質是：${personality}。請用臺灣口音與語氣詳細回答。使用者說：${text}`, {model});
                
                // 2. 在下方建立 AI 的空白訊息框 (修正處：第 3 個參數設為 false 延遲填入文字)
                const aiMsgEl = appendMsg('ai', '', false); 
                document.getElementById('subtitle').innerText = "投影傳輸中...";

                // 3. 處理打字效果與語音
                if (document.getElementById('useTypingEffect').checked) {
                    typeText(aiMsgEl, res, 30);
                } else {
                    aiMsgEl.textContent = res;
                    scrollToBottom();
                }

                speakText(res); 
            } catch (e) {
                const errEl = appendMsg('ai', '', false);
                errEl.textContent = '系統量子連線異常，請重新再試。';
            }
        }

        function appendMsg(role, text, setText = true) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            if (setText) d.innerText = text;
            box.appendChild(d);
            scrollToBottom();
            return d;
        }

        function scrollToBottom() {
            const box = document.getElementById('chatBox');
            box.scrollTop = box.scrollHeight;
        }

        function toggleMenu() { document.getElementById('panel').classList.toggle('open'); }
        function closeMenu() { document.getElementById('panel').classList.remove('open'); }

        // 行動端可視範圍優化
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                scrollToBottom();
            });
            window.visualViewport.addEventListener('scroll', () => {
                if(window.visualViewport.offsetTop > 0){
                    window.scrollTo(0,0);
                }
            });
        }
    </script>
</body>
</html>
