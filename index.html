<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息陪伴 - 佈局修正版</title>
    <script src="https://js.puter.com/v2/"></script>
    
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #111827;
            --text-color: #f9fafb;
            --accent-cyan: #06b6d4;
            --accent-purple: #9333ea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        
        html, body { height: 100%; height: 100dvh; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; }

        .container { display: flex; width: 100%; height: 100%; }

        /* 主顯示區：垂直排列 */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            overflow: hidden;
        }

        /* --- 上方：大型立繪區 (修正不溢出) --- */
        .cabin-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            position: relative; 
            min-height: 0; /* 關鍵：防止內容撐開導致下方對話框被推走 */
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }
        
        .hologram-cabin {
            width: 90%; 
            max-width: 400px;
            height: 90%; 
            border: 2px solid #374151; border-radius: 24px; 
            display: flex; align-items: flex-end; justify-content: center; 
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(6, 182, 212, 0.2);
        }

        .fullbody-display img {
            max-width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 10px var(--accent-cyan));
            animation: floatRhythm 4s ease-in-out infinite;
        }

        @keyframes floatRhythm {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- 下方：獨立對話工作區 (修正文字歸位) --- */
        .chat-section { 
            flex: 0 0 35%; /* 固定佔用螢幕高度 35% */
            display: flex; 
            flex-direction: column; 
            background: #0f172a; 
            border-top: 2px solid var(--accent-cyan); 
            z-index: 10;
        }

        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        /* 訊息氣泡樣式 */
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; max-width: 85%; line-height: 1.6; }
        .msg.user { background: var(--accent-purple); align-self: flex-end; color: white; }
        .msg.ai { 
            background: #1e293b; 
            align-self: flex-start; 
            border-left: 4px solid var(--accent-cyan); 
            color: #e2e8f0;
        }

        .typing { white-space: pre-wrap; }

        /* 底部輸入列 */
        .input-area { 
            padding: 10px; 
            background: #111827; 
            display: flex; gap: 8px; align-items: center;
            border-top: 1px solid #334155;
        }

        input[type="text"] { 
            flex: 1; background: #1e293b; border: 1px solid #475569; 
            color: white; padding: 12px; border-radius: 20px; outline: none;
        }
        
        .btn-send { 
            background: var(--accent-cyan); color: #0f172a; 
            border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        #subtitle {
            position: absolute; bottom: 10px; background: rgba(0,0,0,0.6);
            color: var(--accent-cyan); padding: 4px 12px; border-radius: 10px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-display">
            <div class="cabin-section">
                <div class="hologram-cabin">
                    <div class="fullbody-display">
                        <img src="https://via.placeholder.com/300x600/111827/06b6d4?text=立繪區" id="displayImg">
                    </div>
                </div>
                <div id="subtitle">系統就緒</div>
            </div>

            <div class="chat-section">
                <div class="chat-box" id="chatBox">
                    <div class="msg ai">您好！我已經修正了佈局問題。現在所有的回覆文字（包含保養眼睛的建議）都會精確顯示在這個深色對話框內，不會遮擋上方的立繪。</div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter')send()">
                    <button class="btn-send" onclick="send()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function typeText(element, text, delay = 30) {
            element.textContent = '';
            let index = 0;
            function next() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    const box = document.getElementById('chatBox');
                    box.scrollTop = box.scrollHeight;
                    setTimeout(next, delay);
                }
            }
            next();
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
            return d;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // 1. 使用者文字進入下方框
            const userMsg = appendMsg('user', '');
            userMsg.textContent = text;
            input.value = '';

            document.getElementById('subtitle').innerText = "運算中...";

            try {
                // 2. 呼叫 AI (請確保 Puter 已正確配置)
                const res = await puter.ai.chat(text);
                
                // 3. AI 回覆進入下方框，並執行打字效果
                const aiMsgEl = appendMsg('ai', '');
                typeText(aiMsgEl, res);
                
                document.getElementById('subtitle').innerText = "投影中";
            } catch (e) {
                appendMsg('ai', '系統連線異常，請稍後再試。').textContent = '系統連線異常，請稍後再試。';
            }
        }
    </script>
</body>
</html>
