<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息陪伴 - 大型立繪與打字效果版</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #111827;
            --card-bg: #1f2937;
            --text-color: #f9fafb;
            --accent-cyan: #06b6d4;
            --accent-purple: #9333ea;
            --holo-glow: rgba(6, 182, 212, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif; }
        
        html, body { 
            height: 100%; 
            height: 100dvh; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden;
            position: relative;
        }

        .container { display: flex; width: 100%; height: 100%; }

        /* --- 面板設計 --- */
        .control-panel {
            width: 300px; background-color: var(--panel-bg); border-right: 1px solid #374151;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; transition: transform 0.3s ease; z-index: 100;
        }

        .backup-card {
            background: linear-gradient(145deg, #1f2937, #111827);
            border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem;
        }

        .main-display { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111827 0%, #030712 100%); position: relative; height: 100%; }

        /* --- 大型立繪展示區 (RWD 優化) --- */
        .cabin-section { 
            flex: 1; /* 自動填滿剩餘空間，讓立繪區域儘量大 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            position: relative; 
            overflow: hidden;
        }
        
        .hologram-cabin {
            width: 100%; 
            max-width: 400px; /* 增加最大寬度 */
            height: 98%; /* 幾乎填滿高度 */
            background: rgba(31, 41, 55, 0.4);
            border: 2px solid #374151; border-radius: 24px; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 40px var(--holo-glow);
        }

        /* --- 律動與全息特效 --- */
        .fullbody-display {
            width: 90%; height: 85%; /* 增加高度佔比 */
            margin-bottom: 10px; display: flex; align-items: flex-end; justify-content: center;
            position: relative; z-index: 2;
            animation: floatRhythm 5s ease-in-out infinite; /* 調整律動時間 */
        }
        
        .fullbody-display img {
            max-width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
        }

        .fullbody-display::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(6, 182, 212, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 3;
        }

        @keyframes floatRhythm {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-12px) scale(1.01); filter: brightness(1.2); }
        }

        /* --- 對話區 --- */
        .chat-section { 
            flex: 0 0 200px; /* 固定高度，為大型立繪騰出空間 */
            display: flex; flex-direction: column; 
            background: rgba(17, 24, 39, 0.95); border-top: 1px solid #374151; 
            overflow: hidden; 
        }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; line-height: 1.5; }
        .msg.user { background: var(--accent-purple); align-self: flex-end; }
        .msg.ai { 
            background: #1f2937; align-self: flex-start; 
            border-left: 4px solid var(--accent-cyan);
            min-height: 40px; /* 確保打字時有最小高度 */
        }

        /* --- 打字效果的 CSS 樣式 --- */
        .typing {
            overflow: hidden; /* 確保內容不會溢出 */
            white-space: pre-wrap; /* 保持換行和空格 */
        }

        /* --- 輸入區與語音按鈕 --- */
        .input-area { 
            padding: 8px 12px; 
            padding-bottom: calc(8px + env(safe-area-inset-bottom)); 
            background: #111827; 
            display: flex; 
            gap: 6px; 
            align-items: center;
            border-top: 1px solid #374151;
            position: relative;
            z-index: 10;
        }
        input[type="text"] { flex: 1; background: #1f2937; border: 1px solid #4b5563; color: #fff; padding: 10px; border-radius: 20px; outline: none; font-size: 16px; }
        
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: 0.2s; background: #374151; color: white;
        }
        .icon-btn.active { background: var(--accent-cyan); animation: pulse 1.5s infinite; }
        .btn-send { background: var(--accent-cyan); color: #030712; width: 50px; border-radius: 20px; font-weight: bold; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }

        .mobile-toggle { position: absolute; top: 10px; left: 10px; z-index: 200; background: #1f2937; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px; border-radius: 8px; font-size: 0.8rem; }

        /* 手機版的立繪區域優化 */
        @media (max-width: 768px) {
            .control-panel { position: absolute; transform: translateX(-100%); height: 100%; width: 280px; }
            .control-panel.open { transform: translateX(0); }
            .cabin-section { padding: 5px; }
            .hologram-cabin { max-width: 320px; } /* 手機上略微縮小 */
            .chat-section { flex: 0 0 180px; } /* 手機上對話區更小 */
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleMenu()" id="menuBtn">⚙️ 定制</button>

    <div class="container">
        <div class="control-panel" id="panel">
            <h2 style="margin-top:35px">全息備存中心</h2>
            
            <div class="backup-card">
                <p>☁️ Google Drive 備份</p>
                <button class="btn" onclick="handleAuth()" style="padding:5px; cursor:pointer">1. 帳號授權</button>
                <button class="btn" onclick="saveToDrive()" style="padding:5px; cursor:pointer">2. 匯出備份</button>
                <button class="btn" onclick="loadFromDrive()" style="padding:5px; cursor:pointer">3. 匯入備份</button>
                <div id="authStatus" style="font-size:0.7rem; text-align:center">未連線</div>
            </div>

            <div class="section" style="margin-top:10px">
                <h3>大型形象律動</h3>
                <p style="font-size:0.7rem; color:#888;">請上傳直式全身高解析圖片。</p>
                <label class="btn" style="display:block; text-align:center; cursor:pointer; background:#374151; padding:10px; border-radius:8px">
                    📸 上傳形象照
                    <input type="file" style="display:none" accept="image/*" onchange="handleImg(this)">
                </label>
            </div>

            <div class="section">
                <h3>打字與語音</h3>
                <div style="font-size:0.8rem; display:flex; justify-content:space-between; align-items:center">
                    <span>打字顯示回覆</span>
                    <input type="checkbox" id="useTypingEffect" checked>
                </div>
                <div style="font-size:0.8rem; display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                    <span>自動朗讀回覆</span>
                    <input type="checkbox" id="autoSpeech" checked>
                </div>
            </div>

            <div class="section">
                <h3>陪伴參數</h3>
                <select id="modelSelect" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; border:1px solid #4b5563;">
                    <option value="gpt-4o">GPT-4o (推薦)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5</option>
                </select>
                <select id="personality" style="width:100%; padding:8px; border-radius:5px; background:#1f2937; color:white; margin-top:5px; border:1px solid #4b5563;">
                    <option value="溫柔、有耐心的臺灣語音">溫柔體貼</option>
                    <option value="幽默、喜歡開玩笑的摯友語音">幽默風趣</option>
                </select>
            </div>
        </div>

        <div class="main-display" onclick="closeMenu()">
            <div class="cabin-section">
                <div class="hologram-cabin">
                    <div class="fullbody-display">
                        <img src="https://via.placeholder.com/300x700/111827/06b6d4?text=AI+Hologram" id="displayImg">
                    </div>
                </div>
                <div id="subtitle" style="position:absolute; bottom:15px; background:rgba(0,0,0,0.7); padding:5px 15px; border-radius:15px; font-size:0.8rem; color:var(--accent-cyan); border:1px solid var(--accent-cyan); max-width:80%; text-align:center">
                    我在聽，請說話...
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-box" id="chatBox">
                    <div class="msg ai typing">您好！我已優化介面。現在「立繪展示區」更為寬廣，且我的回覆將呈現動態的打字效果，讓對話更有律動感。試試用語音與我聊天吧！</div>
                </div>
                <div class="input-area">
                    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="語音輸入">🎤</button>
                    <input type="text" id="userInput" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter')send()">
                    <button class="icon-btn btn-send" onclick="send()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================= 認證資訊 =======================
        const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let tokenClient;
        let accessToken = null;

        // ======================= 語音功能 (STT/TTS) =======================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = false;
            recognition.continuous = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                send(); 
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('active');
                fixViewportScroll(); 
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("您的瀏覽器不支援語音辨識");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                document.getElementById('voiceBtn').classList.add('active');
            }
        }

        function speakText(text) {
            if (!document.getElementById('autoSpeech').checked) return;
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-TW';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // ======================= 打字效果的核心邏輯 =======================
        function typeText(element, text, delay = 50) {
            // 清空原本的文字，開始打字
            element.textContent = '';
            let index = 0;

            function typeNextChar() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    // 對話框自動置底
                    scrollToBottom();
                    setTimeout(typeNextChar, delay);
                } else {
                    // 打字結束，移除打字狀態標記（如果有的話）
                    element.classList.remove('typing');
                }
            }
            
            // 開始打字並加上狀態標記
            element.classList.add('typing');
            typeNextChar();
        }

        // ======================= 視口修正 =======================
        function fixViewportScroll() {
            window.scrollTo(0, 0);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 100);
            setTimeout(() => { window.scrollTo(0, 0); scrollToBottom(); }, 250);
        }

        // ======================= Google Drive 功能 =======================
        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    accessToken = res.access_token;
                    document.getElementById('authStatus').innerText = "✅ 已授權";
                    document.getElementById('authStatus').style.color = "#06b6d4";
                },
            });
            // 初始化 TTS，避免疊音
            window.speechSynthesis.cancel();
            
            // 由於打字效果會影響第一個預設回覆，我們手動執行它
            const firstAiMsgDiv = document.querySelector('.msg.ai.typing');
            if (firstAiMsgDiv && document.getElementById('useTypingEffect').checked) {
                const text = firstAiMsgDiv.textContent;
                typeText(firstAiMsgDiv, text);
            }
        };

        function handleAuth() { tokenClient.requestAccessToken({prompt: 'consent'}); }

        async function saveToDrive() {
            if (!accessToken) return alert("請先授權");
            const data = {
                image: document.getElementById('displayImg').src,
                model: document.getElementById('modelSelect').value,
                personality: document.getElementById('personality').value
            };
            const metadata = { name: 'ai_hologram_tw_save_large.json', mimeType: 'application/json' };
            const file = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', file);

            try {
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                    body: form
                });
                alert("雲端備份成功！");
            } catch (e) { alert("備份失敗"); }
        }

        async function loadFromDrive() {
            if (!accessToken) return alert("請先授權");
            try {
                const search = await fetch('https://www.googleapis.com/drive/v3/files?q=name="ai_hologram_tw_save_large.json"&orderBy=createdTime desc', {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const list = await search.json();
                if (list.files.length === 0) return alert("找不到備份");
                const fileId = list.files[0].id;
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                const config = await fileRes.json();
                document.getElementById('displayImg').src = config.image;
                document.getElementById('modelSelect').value = config.model;
                document.getElementById('personality').value = config.personality;
                alert("備份還原成功！");
            } catch (e) { alert("匯入失敗"); }
        }

        // ======================= 核心對話邏輯 =======================
        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('displayImg').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMsg('user', text);
            input.value = '';
            input.blur(); 
            fixViewportScroll();

            document.getElementById('subtitle').innerText = "思考中...";

            try {
                const model = document.getElementById('modelSelect').value;
                const personality = document.getElementById('personality').value;
                const res = await puter.ai.chat(`你是${personality}。請用臺灣口音回答。使用者說：${text}`, {model});
                
                // 獲取回覆框元素
                const aiMsgEl = appendMsg('ai', res, false); // false 表示先不顯示文字
                document.getElementById('subtitle').innerText = res;

                // 根據設定執行打字效果或直接朗讀
                if (document.getElementById('useTypingEffect').checked) {
                    typeText(aiMsgEl, res, 40); // 調整打字速度
                } else {
                    aiMsgEl.textContent = res;
                }

                speakText(res); 
            } catch (e) {
                appendMsg('ai', '連線異常，請稍後再試。');
            }
        }

        // 用於打字效果的 appendMsg 版本：可以選擇不立即填入文字
        function appendMsg(role, text, setText = true) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            if (setText) d.innerText = text;
            box.appendChild(d);
            scrollToBottom();
            return d;
        }

        function scrollToBottom() {
            const box = document.getElementById('chatBox');
            box.scrollTop = box.scrollHeight;
        }

        function toggleMenu() { document.getElementById('panel').classList.toggle('open'); }
        function closeMenu() { document.getElementById('panel').classList.remove('open'); }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                scrollToBottom();
            });
            window.visualViewport.addEventListener('scroll', () => {
                if(window.visualViewport.offsetTop > 0){
                    window.scrollTo(0,0);
                }
            });
        }
    </script>
</body>
</html>
