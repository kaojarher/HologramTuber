<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息陪伴 - 臺灣語音雲端終極修復版</title>
    <script src="https://js.puter.com/v2/"></script>
    <!-- 【修復1】移除 async defer，改用 onGoogleLibraryLoad 回呼確保載入時序正確 -->
    <script src="https://accounts.google.com/gsi/client" onload="initGoogleAuth()"></script>
    
    <style>
        :root {
            --bg-color: #050a16;
            --panel-bg: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-cyan: #22d3ee;
            --accent-purple: #8b5cf6;
            --holo-glow: rgba(34, 211, 238, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", system-ui, sans-serif; }
        
        html { 
            height: 100%; 
            background-color: var(--bg-color);
        }
        body { 
            height: 100%; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .container { display: flex; width: 100%; height: 100%; position: relative; }

        .mobile-toggle { 
            position: fixed; 
            top: 12px; 
            left: 12px; 
            z-index: 10005; 
            background: #1e293b; 
            color: var(--accent-cyan); 
            border: 2px solid var(--accent-cyan); 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            cursor: pointer;
            touch-action: manipulation;
        }
        .mobile-toggle:active {
            transform: scale(0.95);
            background: var(--accent-cyan);
            color: #050a16;
        }

        .control-panel {
            width: 300px; background-color: var(--panel-bg); border-right: 1px solid #334155;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; transition: transform 0.3s ease; 
            z-index: 10000;
        }

        .backup-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem;
        }

        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle at center, #0f172a 0%, #050a16 100%); 
            position: relative; 
            min-height: 0;
            overflow: hidden;
            z-index: 10;
        }

        .cabin-section { 
            flex: 0 0 55%; 
            min-height: 0; 
            display: flex; 
            align-items: stretch; 
            justify-content: center; 
            padding: 8px 10px 4px; 
            position: relative; 
        }
        
        .hologram-cabin {
            width: 100%; 
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid #334155; border-radius: 20px; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 30px var(--holo-glow);
        }

        .subtitle-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--accent-cyan);
            padding: 8px 14px;
            font-size: 1rem;
            color: var(--accent-cyan);
            text-align: center;
            line-height: 1.4;
            z-index: 10;
            min-height: 38px;
            pointer-events: none;
        }

        .fullbody-display {
            width: 90%; 
            height: calc(100% - 44px);
            margin-bottom: 44px;
            display: flex; align-items: flex-end; justify-content: center;
            position: relative; z-index: 2;
            animation: floatRhythm 4s ease-in-out infinite;
        }
        
        .fullbody-display img {
            max-width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 14px var(--accent-cyan));
            mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
        }

        .fullbody-display::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(34, 211, 238, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 3;
        }

        @keyframes floatRhythm {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-8px) scale(1.02); filter: brightness(1.15); }
        }

        .chat-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: rgba(15, 23, 42, 0.9); 
            border-top: 1px solid #334155; 
            overflow: hidden;
            min-height: 0;
            z-index: 15;
        }
        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            min-height: 0;
        }
        
        .msg { padding: 12px 16px; border-radius: 14px; font-size: 1.15rem; max-width: 88%; line-height: 1.7; word-break: break-all; }
        .msg.user { background: var(--accent-purple); align-self: flex-end; }
        
        .msg.ai { 
            background: #334155; 
            align-self: flex-start; 
            border-left: 4px solid var(--accent-cyan); 
            max-height: 5.1em; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px; height: 1.1em;
            background: var(--accent-cyan);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .input-area { 
            flex-shrink: 0;
            padding: 10px 15px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: #0f172a; 
            display: flex; 
            gap: 8px; 
            align-items: center;
            border-top: 1px solid #334155;
            position: relative;
            z-index: 20;
        }
        input[type="text"] { flex: 1; background: #1e293b; border: 1px solid #475569; color: #fff; padding: 14px 16px; border-radius: 25px; outline: none; font-size: 18px; }
        
        .icon-btn {
            width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
            transition: 0.2s; background: #334155; color: white; flex-shrink: 0;
        }
        .icon-btn.active { background: var(--accent-cyan); animation: pulse 1.5s infinite; }
        .btn-send { background: var(--accent-cyan); color: #050a16; width: 70px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }

        @media (max-width: 768px) {
            .control-panel { position: absolute; transform: translateX(-100%); height: 100%; }
            .control-panel.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.6); }
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" id="menuBtn">⚙️ 定制</button>

    <div class="container">
        <div class="control-panel" id="panel" onclick="event.stopPropagation()">
            <h2 style="margin-top:40px">雲端同步與設定</h2>
            
            <div class="backup-card">
                <p>☁️ Google Drive 備份</p>
                <button class="btn" onclick="handleAuth()" style="padding:5px; cursor:pointer">1. 帳號授權</button>
                <button class="btn" onclick="saveToDrive()" style="padding:5px; cursor:pointer">2. 匯出備份</button>
                <button class="btn" onclick="loadFromDrive()" style="padding:5px; cursor:pointer">3. 匯入備份</button>
                <div id="authStatus" style="font-size:0.7rem; text-align:center">未連線</div>
            </div>

            <div class="section" style="margin-top:10px">
                <h3>全身形象律動</h3>
                <label class="btn" style="display:block; text-align:center; cursor:pointer; background:#334155; padding:10px; border-radius:8px">
                    📸 上傳全身照
                    <input type="file" style="display:none" accept="image/*" onchange="handleImg(this)">
                </label>
            </div>

            <div class="section">
                <h3>臺灣語音設定</h3>
                <div style="font-size:0.8rem; display:flex; justify-content:space-between; align-items:center">
                    <span>自動朗讀回覆</span>
                    <input type="checkbox" id="autoSpeech" checked>
                </div>
            </div>

            <div class="section">
                <h3>陪伴參數</h3>
                <select id="modelSelect" style="width:100%; padding:8px; border-radius:5px; background:#1e293b; color:white">
                    <option value="gpt-4o">GPT-4o (推薦)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5</option>
                </select>
                <select id="personality" style="width:100%; padding:8px; border-radius:5px; background:#1e293b; color:white; margin-top:5px">
                    <option value="溫柔、有耐心的臺灣女生">溫柔體貼</option>
                    <option value="幽默、喜歡開玩笑的摯友">幽默風趣</option>
                </select>
            </div>
            
            <button id="explicitCloseBtn" style="background:#ff4757; color:white; padding:10px; border:none; border-radius:8px; margin-top:20px; cursor:pointer; width:100%;">關閉選單</button>
        </div>

        <div class="main-display" id="displayArea">
            <div class="cabin-section">
                <div class="hologram-cabin">
                    <div class="fullbody-display">
                        <img src="https://via.placeholder.com/200x500/0f172a/22d3ee?text=AI+Hologram" id="displayImg">
                    </div>
                    <div id="subtitle" class="subtitle-bar">我在聽，請說話...</div>
                </div>
            </div>

            <div class="chat-section" onclick="event.stopPropagation()">
                <div class="chat-box" id="chatBox">
                    <div class="msg ai">您好！我是您的全息陪伴。本地端點擊衝突已完全修復。當 AI 回覆內容長度大於三行時，會在回應氣泡內啟動打字機專屬的自動下滾動捲軸，絕不往上擠壓您的精緻全息立繪空間！</div>
                </div>
                <div class="input-area">
                    <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="語音輸入">🎤</button>
                    <input type="text" id="userInput" placeholder="輸入訊息或使用語音..." onkeypress="if(event.key==='Enter')send()">
                    <button class="icon-btn btn-send" onclick="send()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================= 認證資訊 =======================
        const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let tokenClient;
        let accessToken = null;

        // ======================= 【修復1】Google GSI 初始化改為獨立函式，由 onload 觸發 =======================
        function initGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    if (res.error) {
                        alert('授權失敗：' + res.error);
                        return;
                    }
                    accessToken = res.access_token;
                    document.getElementById('authStatus').innerText = "✅ 已授權";
                    document.getElementById('authStatus').style.color = "#22d3ee";
                },
            });
            // 預載語音列表
            window.speechSynthesis.getVoices();
        }

        // ======================= 【修復4】選單按鈕：防止行動端 touchstart + click 雙重觸發 =======================
        const panel = document.getElementById('panel');
        const menuBtn = document.getElementById('menuBtn');
        const displayArea = document.getElementById('displayArea');
        const explicitCloseBtn = document.getElementById('explicitCloseBtn');

        let lastToggleTime = 0; // 防抖旗標

        function toggleMenu(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
            const now = Date.now();
            if (now - lastToggleTime < 300) return; // 300ms 內防重複觸發
            lastToggleTime = now;
            panel.classList.toggle('open');
        }

        function closeMenu() { 
            panel.classList.remove('open'); 
        }

        menuBtn.addEventListener('touchstart', toggleMenu, { passive: false });
        menuBtn.addEventListener('click', toggleMenu);
        
        explicitCloseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeMenu();
        });

        displayArea.addEventListener('click', () => {
            if (panel.classList.contains('open')) {
                closeMenu();
            }
        });

        // ======================= 語音功能 (STT/TTS) =======================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;
        let pendingSendAfterRecognition = false; // 【修復3】標記是否需在 onend 後送出

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = false;
            recognition.continuous = false;

            // 【修復3】onresult 只設定文字，不立即 send()
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                pendingSendAfterRecognition = true; // 標記待送出
            };

            // 【修復3】onend 才真正送出，避免 iOS blur 打斷辨識流程
            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('active');
                fixViewportScroll();
                if (pendingSendAfterRecognition) {
                    pendingSendAfterRecognition = false;
                    const input = document.getElementById('userInput');
                    if (input.value.trim()) send();
                }
            };

            recognition.onerror = (event) => {
                isListening = false;
                pendingSendAfterRecognition = false;
                document.getElementById('voiceBtn').classList.remove('active');
                console.warn('語音辨識錯誤：', event.error);
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("您的瀏覽器不支援語音辨識");
            if (isListening) {
                recognition.stop();
            } else {
                pendingSendAfterRecognition = false;
                recognition.start();
                isListening = true;
                document.getElementById('voiceBtn').classList.add('active');
            }
        }

        function speakText(text) {
            if (!document.getElementById('autoSpeech').checked) return;
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-TW';
            msg.rate = 1.0;
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.name.includes('Hanhan') || v.name.includes('Yating'));
            if (twVoice) msg.voice = twVoice;
            window.speechSynthesis.speak(msg);
        }

        function fixViewportScroll() {
            window.scrollTo(0, 0);
            setTimeout(() => { 
                window.scrollTo(0, 0); 
                updateViewportHeight();
                scrollToBottom(); 
            }, 150);
        }

        // ======================= Google Drive 功能 =======================
        function handleAuth() {
            if (!tokenClient) {
                alert('Google 授權尚未初始化，請稍後再試');
                return;
            }
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function saveToDrive() {
            if (!accessToken) return alert("請先授權");
            const data = {
                image: document.getElementById('displayImg').src,
                model: document.getElementById('modelSelect').value,
                personality: document.getElementById('personality').value
            };
            const metadata = { name: 'ai_hologram_tw_save.json', mimeType: 'application/json' };
            const file = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', file);

            try {
                const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
                    body: form
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                alert("雲端備份成功！");
            } catch (e) { alert("備份失敗：" + e.message); }
        }

        async function loadFromDrive() {
            if (!accessToken) return alert("請先授權");
            try {
                const search = await fetch('https://www.googleapis.com/drive/v3/files?q=name="ai_hologram_tw_save.json"&orderBy=createdTime desc', {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                if (!search.ok) throw new Error('HTTP ' + search.status);
                const list = await search.json();

                // 【修復5】安全檢查 files 是否存在且非空
                if (!list.files || list.files.length === 0) return alert("找不到備份");

                const fileId = list.files[0].id;
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: new Headers({'Authorization': 'Bearer ' + accessToken})
                });
                if (!fileRes.ok) throw new Error('HTTP ' + fileRes.status);
                const config = await fileRes.json();
                document.getElementById('displayImg').src = config.image;
                document.getElementById('modelSelect').value = config.model;
                document.getElementById('personality').value = config.personality;
                alert("備份還原成功！");
            } catch (e) { alert("匯入失敗：" + e.message); }
        }

        // ======================= 核心對話邏輯 =======================
        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('displayImg').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 【修復2】正確解析 Puter AI 回傳的陣列格式 content
        function extractText(res) {
            let raw = '';
            if (typeof res === 'string') {
                raw = res;
            } else if (res?.message?.content) {
                const content = res.message.content;
                if (Array.isArray(content)) {
                    // Puter/OpenAI 標準格式：content 是 [{type:"text", text:"..."}] 陣列
                    raw = content.map(c => c.text || c.content || '').join('');
                } else if (typeof content === 'string') {
                    raw = content;
                } else {
                    raw = JSON.stringify(content);
                }
            } else {
                raw = res?.content ?? res?.text ?? JSON.stringify(res);
            }
            return raw
                .replace(/\*\*(.+?)\*\*/g, '$1')
                .replace(/\*(.+?)\*/g, '$1')
                .replace(/#{1,6}\s?/g, '')
                .replace(/`(.+?)`/g, '$1')
                .trim();
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMsg('user', text);
            input.value = '';
            
            input.blur(); 
            fixViewportScroll();

            document.getElementById('subtitle').innerText = "思考中...";

            try {
                const model = document.getElementById('modelSelect').value;
                const personality = document.getElementById('personality').value;
                const raw = await puter.ai.chat(
                    `你是${personality}。請用臺灣常用的語氣回答，禁止使用 markdown 格式（不可用 ** * # \` 等符號）。使用者說：${text}`,
                    {model}
                );
                const resText = extractText(raw);

                typewriterMsg('ai', resText);

                const shortSubtitle = resText.length > 20 ? resText.slice(0, 20) + '…' : resText;
                document.getElementById('subtitle').innerText = shortSubtitle;

                speakText(resText); 
            } catch (e) {
                appendMsg('ai', '連線異常，請稍後再試。');
                document.getElementById('subtitle').innerText = '連線異常';
                console.error('AI 對話錯誤：', e);
            }
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            d.innerText = text;
            box.appendChild(d);
            scrollToBottom();
            return d;
        }

        function typewriterMsg(role, fullText) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${role}`;

            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            d.appendChild(cursor);
            box.appendChild(d);
            scrollToBottom();

            let i = 0;
            const speed = 28;

            (function type() {
                if (i < fullText.length) {
                    d.insertBefore(document.createTextNode(fullText[i]), cursor);
                    i++;
                    box.scrollTop = box.scrollHeight;
                    d.scrollTop = d.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    cursor.remove();
                    box.scrollTop = box.scrollHeight;
                    d.scrollTop = d.scrollHeight;
                }
            })();

            return d;
        }

        function scrollToBottom() {
            const box = document.getElementById('chatBox');
            box.scrollTop = box.scrollHeight;
        }

        // 【修復6】只在行動端套用動態視口高度，桌面端不覆蓋 CSS height:100%
        function updateViewportHeight() {
            if (window.innerWidth > 768) return;
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.querySelector('.container').style.height = vh + 'px';
            scrollToBottom();
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateViewportHeight);
            window.visualViewport.addEventListener('scroll', () => {
                window.scrollTo(0, 0);
            });
        }

        updateViewportHeight();
        window.addEventListener('resize', updateViewportHeight);
    </script>
</body>
</html>
